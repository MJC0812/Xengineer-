<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 语音绘图工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .canvas-container {
            flex: 1;
            position: relative;
            background: white;
            margin: 20px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        #canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        
        .control-panel {
            width: 320px;
            background: rgba(255, 255, 255, 0.95);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(10px);
        }
        
        .logo {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .logo h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .logo p {
            font-size: 12px;
            color: #888;
        }
        
        .status-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
        }
        
        .status-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        
        .status-indicator.listening {
            border-color: #4CAF50;
            background: #e8f5e9;
        }
        
        .status-indicator.error {
            border-color: #f44336;
            background: #ffebee;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #9e9e9e;
            transition: all 0.3s ease;
        }
        
        .status-indicator.listening .status-dot {
            background: #4CAF50;
            animation: pulse 1.5s infinite;
        }
        
        .status-indicator.error .status-dot {
            background: #f44336;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        
        .status-text {
            font-size: 14px;
            color: #333;
        }
        
        .voice-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .voice-btn.start {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        
        .voice-btn.start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        
        .voice-btn.stop {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
            color: white;
        }
        
        .voice-btn.stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(244, 67, 54, 0.4);
        }
        
        .command-history {
            flex: 1;
            overflow-y: auto;
        }
        
        .history-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .history-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .history-item {
            padding: 10px 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .history-item .icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        .history-item.success .icon {
            background: #e8f5e9;
            color: #4CAF50;
        }
        
        .history-item.error .icon {
            background: #ffebee;
            color: #f44336;
        }
        
        .history-item .text {
            flex: 1;
            color: #333;
        }
        
        .history-item .time {
            font-size: 11px;
            color: #999;
        }
        
        .tips-section {
            background: #fff3e0;
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid #ff9800;
        }
        
        .tips-title {
            font-size: 14px;
            color: #e65100;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .tips-list {
            list-style: none;
            font-size: 12px;
            color: #8d6e63;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .tips-list li::before {
            content: '•';
            color: #ff9800;
            margin-right: 6px;
        }
        
        .current-tool {
            background: #e3f2fd;
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid #2196F3;
        }
        
        .current-tool-title {
            font-size: 14px;
            color: #1976D2;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .current-tool-value {
            font-size: 16px;
            color: #333;
            font-weight: bold;
        }
        
        .dialect-section {
            background: #f3e5f5;
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid #9c27b0;
        }
        
        .dialect-title {
            font-size: 14px;
            color: #7b1fa2;
            margin-bottom: 12px;
            font-weight: bold;
        }
        
        .dialect-select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ce93d8;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .dialect-select:focus {
            outline: none;
            border-color: #9c27b0;
            box-shadow: 0 0 0 3px rgba(156, 39, 176, 0.1);
        }
        
        .dialect-info {
            margin-top: 8px;
            font-size: 12px;
            color: #8e24aa;
        }
        
        .mode-section {
            background: #e8f5e9;
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid #4CAF50;
        }
        
        .mode-title {
            font-size: 14px;
            color: #2e7d32;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .mode-value {
            font-size: 16px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        <div class="control-panel">
            <div class="logo">
                <h1>🎨 语音绘图</h1>
                <p>纯语音控制的AI绘图工具</p>
            </div>
            
            <div class="status-section">
                <div class="status-title">语音状态</div>
                <div class="status-indicator" id="statusIndicator">
                    <div class="status-dot"></div>
                    <div class="status-text" id="statusText">点击开始按钮开始语音识别</div>
                </div>
            </div>
            
            <button class="voice-btn start" id="voiceBtn">
                <span>🎤</span>
                <span>开始语音</span>
            </button>
            
            <div class="dialect-section">
                <div class="dialect-title">🌍 方言选择</div>
                <select class="dialect-select" id="dialectSelect">
                    <option value="mandarin">普通话</option>
                    <option value="cantonese">粤语/广东话</option>
                    <option value="sichuan">四川话</option>
                    <option value="shanghai">上海话</option>
                    <option value="minnan">闽南语</option>
                    <option value="northeast">东北话</option>
                    <option value="wu">吴语</option>
                    <option value="hakka">客家话</option>
                </select>
                <div class="dialect-info" id="dialectInfo">当前: 普通话</div>
            </div>
            
            <div class="current-tool">
                <div class="current-tool-title">当前工具</div>
                <div class="current-tool-value" id="currentTool">画笔工具</div>
            </div>
            
            <div class="mode-section">
                <div class="mode-title">绘制模式</div>
                <div class="mode-value" id="modeValue">描边模式</div>
            </div>
            
            <div class="command-history">
                <div class="history-title">指令历史</div>
                <ul class="history-list" id="historyList"></ul>
            </div>
            
            <div class="tips-section">
                <div class="tips-title">💡 使用提示</div>
                <ul class="tips-list" id="tipsList">
                    <li>说"画圆"绘制圆形</li>
                    <li>说"画正方形"绘制正方形</li>
                    <li>说"画直线"绘制直线</li>
                    <li>说"红色"切换颜色</li>
                    <li>说"撤销"撤销操作</li>
                    <li>说"清空"清空画布</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
